<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Docker Manual Build Demo</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <p class="eyebrow">StackSight Demo</p>
        <h1>Frontend-Only Manual Build Demo</h1>
      </header>

      <section class="cards">
        <article class="card">
          <h2>Current Time</h2>
          <p id="clock">--:--:--</p>
        </article>

        <article class="card">
          <h2>Build Status</h2>
          <p id="status">Ready</p>
        </article>
      </section>

      <section class="panel">
        <h2>Quick Notes</h2>
        <div class="row">
          <input id="noteInput" type="text" placeholder="Type a note and add it" />
          <button id="addNoteBtn">Add</button>
        </div>
        <ul id="notesList"></ul>
      </section>

      <section class="panel actions">
        <h2>Actions</h2>
        <div class="row">
          <button id="simulateBtn">Simulate Build Step</button>
          <button id="clearBtn" class="secondary">Clear Notes</button>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
